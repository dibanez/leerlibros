<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LeerLibros · Lector de inglés con ayuda</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#9a5b34">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LeerLibros">
<meta name="mobile-web-app-capable" content="yes">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg:#f4f1ea; --panel:#fffdf8; --ink:#2b2620; --muted:#7c7368;
    --accent:#9a5b34; --accent-soft:#e9dcc9; --border:#e2d9c9;
    --shadow:0 6px 24px rgba(60,45,25,.12);
    --reader-font:'Georgia', 'Times New Roman', serif;
  }
  [data-theme="dark"]{
    --bg:#16151a; --panel:#201f26; --ink:#e7e3da; --muted:#9c958a;
    --accent:#d29a6a; --accent-soft:#2e2a32; --border:#34313c;
    --shadow:0 6px 24px rgba(0,0,0,.4);
  }
  [data-theme="sepia"]{
    --bg:#e8dcc0; --panel:#f3ead4; --ink:#41372a; --muted:#867a63;
    --accent:#8a5a2b; --accent-soft:#dccaa3; --border:#d6c7a6;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--ink); transition:background .3s,color .3s;
  }
  header.topbar{
    position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:12px;
    padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--border);
    box-shadow:0 1px 8px rgba(0,0,0,.05); flex-wrap:wrap;
    padding-top:calc(10px + env(safe-area-inset-top));
  }
  .topbar h1{font-size:18px; margin:0; font-weight:700; letter-spacing:.3px; cursor:pointer}
  .topbar h1 span{color:var(--accent)}
  .grow{flex:1}
  button,.btn{
    font:inherit; cursor:pointer; border:1px solid var(--border); background:var(--panel);
    color:var(--ink); padding:7px 12px; border-radius:9px; transition:.15s;
  }
  button:hover,.btn:hover{border-color:var(--accent); color:var(--accent)}
  button.primary{background:var(--accent); color:#fff; border-color:var(--accent)}
  button.primary:hover{filter:brightness(1.07); color:#fff}
  .iconbtn{padding:7px 10px; line-height:1}
  main{max-width:820px; margin:0 auto; padding:24px 18px 120px}

  /* Library */
  .lib-actions{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:22px}
  .dropzone{
    border:2px dashed var(--border); border-radius:14px; padding:26px; text-align:center;
    color:var(--muted); margin-bottom:24px; transition:.2s; background:var(--panel);
  }
  .dropzone.drag{border-color:var(--accent); color:var(--accent); background:var(--accent-soft)}
  .booklist{display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:16px}
  .bookcard{
    background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px;
    box-shadow:var(--shadow); cursor:pointer; transition:.18s; position:relative; min-height:140px;
    display:flex; flex-direction:column;
  }
  .bookcard:hover{transform:translateY(-3px); border-color:var(--accent)}
  .bookcard .title{font-weight:700; font-size:15px; margin-bottom:6px; line-height:1.3}
  .bookcard .meta{font-size:12px; color:var(--muted); margin-top:auto}
  .bookcard .prog{height:5px; background:var(--accent-soft); border-radius:4px; margin-top:8px; overflow:hidden}
  .bookcard .prog i{display:block; height:100%; background:var(--accent)}
  .bookcard .del{
    position:absolute; top:8px; right:8px; border:none; background:transparent; color:var(--muted);
    font-size:16px; padding:4px 7px; border-radius:8px;
  }
  .bookcard .del:hover{background:var(--accent-soft); color:#c0392b}
  .empty{color:var(--muted); text-align:center; padding:40px; font-size:15px}

  /* Reader */
  #reader{display:none}
  .reader-text{
    font-family:var(--reader-font); font-size:var(--fs,20px); line-height:1.75;
    background:var(--panel); padding:34px 38px; border-radius:14px; box-shadow:var(--shadow);
    border:1px solid var(--border);
  }
  .reader-text p{margin:0 0 1.1em}
  .reader-text h2{font-size:1.3em; margin:0 0 .8em}
  .w{cursor:pointer; border-radius:4px; padding:0 1px; transition:background .1s}
  .w:hover{background:var(--accent-soft)}
  .w.saved{border-bottom:2px solid var(--accent)}
  .chapnav{display:flex; align-items:center; gap:12px; justify-content:space-between; margin:22px 4px}
  .chapnav .pageinfo{color:var(--muted); font-size:13px}

  /* Popup */
  #pop{
    position:absolute; z-index:50; max-width:340px; width:max-content; min-width:230px;
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    box-shadow:var(--shadow); padding:14px 16px; display:none; font-size:14px;
  }
  #pop .head{display:flex; align-items:baseline; gap:8px; margin-bottom:6px}
  #pop .term{font-size:18px; font-weight:700; color:var(--accent)}
  #pop .phon{color:var(--muted); font-size:13px}
  #pop .trans{font-size:16px; margin:4px 0 8px; padding:7px 10px; background:var(--accent-soft); border-radius:9px}
  #pop .pos{font-style:italic; color:var(--muted); font-size:12px; margin-top:8px}
  #pop .defn{margin:2px 0 0; padding-left:2px}
  #pop .ex{color:var(--muted); font-style:italic; font-size:13px; margin-top:3px}
  #pop .row{display:flex; gap:8px; margin-top:11px}
  #pop .row button{flex:1; padding:6px; font-size:13px}
  #pop .loading{color:var(--muted)}
  #pop .err{color:#c0392b; font-size:13px}
  #pop .spk{border:none; background:transparent; cursor:pointer; font-size:16px; padding:2px 5px}
  #pop .spk:hover{color:var(--accent)}

  /* Vocab panel */
  .modal-bg{
    position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:60; display:none;
    align-items:center; justify-content:center; padding:18px;
  }
  .modal{
    background:var(--panel); border-radius:16px; max-width:560px; width:100%; max-height:82vh;
    overflow:auto; padding:22px; box-shadow:var(--shadow); border:1px solid var(--border);
  }
  .modal h2{margin:0 0 14px}
  .vocab-item{
    display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);
  }
  .vocab-item .vt{font-weight:700; color:var(--accent); min-width:110px}
  .vocab-item .vd{flex:1; font-size:14px; color:var(--ink)}
  .vocab-item .vdel{border:none; background:transparent; color:var(--muted); cursor:pointer; font-size:16px}
  .vocab-item .vdel:hover{color:#c0392b}
  textarea{
    width:100%; min-height:200px; font:inherit; padding:12px; border-radius:10px;
    border:1px solid var(--border); background:var(--bg); color:var(--ink); resize:vertical;
  }
  input.titlein{width:100%; padding:9px 12px; border-radius:9px; border:1px solid var(--border);
    background:var(--bg); color:var(--ink); font:inherit; margin-bottom:10px}
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink);
    color:var(--bg); padding:10px 18px; border-radius:30px; font-size:14px; z-index:80;
    opacity:0; transition:opacity .25s; pointer-events:none;
  }
  .toast.show{opacity:.95}
  .seg{display:flex; border:1px solid var(--border); border-radius:9px; overflow:hidden}
  .seg button{border:none; border-radius:0; padding:7px 11px}
  .seg button.on{background:var(--accent); color:#fff}
  .hidden{display:none!important}
  label.fld{display:block; font-size:13px; color:var(--muted); margin:10px 0 4px}
</style>
</head>
<body data-theme="light">

<header class="topbar">
  <h1 onclick="goLibrary()">📖 Leer<span>Libros</span></h1>
  <div class="grow"></div>
  <div id="readerControls" class="hidden" style="display:flex; gap:8px; align-items:center">
    <button class="iconbtn" title="Reducir texto" onclick="changeFont(-1)">A−</button>
    <button class="iconbtn" title="Aumentar texto" onclick="changeFont(1)">A+</button>
  </div>
  <div class="seg" title="Tema">
    <button onclick="setTheme('light')" id="th-light">☀️</button>
    <button onclick="setTheme('sepia')" id="th-sepia">📜</button>
    <button onclick="setTheme('dark')" id="th-dark">🌙</button>
  </div>
  <button onclick="openVocab()">⭐ Vocabulario</button>
  <button id="installBtn" class="primary hidden" onclick="doInstall()">⬇️ Instalar</button>
</header>

<main>
  <!-- LIBRARY -->
  <section id="library">
    <div class="lib-actions">
      <button class="primary" onclick="openPaste()">✏️ Pegar texto</button>
      <label class="btn" style="display:inline-flex; align-items:center">
        📂 Subir .txt / .epub
        <input type="file" accept=".txt,.epub" multiple style="display:none" onchange="handleFiles(this.files)">
      </label>
    </div>
    <div id="dropzone" class="dropzone">
      Arrastra aquí tus archivos <b>.txt</b> o <b>.epub</b>, o usa los botones de arriba.
    </div>
    <div id="booklist" class="booklist"></div>
    <div id="libEmpty" class="empty hidden">Tu biblioteca está vacía. Añade un libro para empezar a leer 📚</div>
  </section>

  <!-- READER -->
  <section id="reader">
    <h2 id="readerTitle" style="margin:0 0 4px"></h2>
    <div class="chapnav">
      <button onclick="prevChapter()" id="prevBtn">← Anterior</button>
      <span class="pageinfo" id="pageInfo"></span>
      <button onclick="nextChapter()" id="nextBtn">Siguiente →</button>
    </div>
    <div id="readerText" class="reader-text"></div>
    <div class="chapnav">
      <button onclick="prevChapter()">← Anterior</button>
      <span class="pageinfo" id="pageInfo2"></span>
      <button onclick="nextChapter()">Siguiente →</button>
    </div>
  </section>
</main>

<!-- Word/phrase popup -->
<div id="pop"></div>

<!-- Paste modal -->
<div id="pasteModal" class="modal-bg">
  <div class="modal">
    <h2>Pegar texto de un libro</h2>
    <input id="pasteTitle" class="titlein" placeholder="Título del libro">
    <textarea id="pasteText" placeholder="Pega aquí el texto en inglés…"></textarea>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:14px">
      <button onclick="closeModal('pasteModal')">Cancelar</button>
      <button class="primary" onclick="savePaste()">Guardar y leer</button>
    </div>
  </div>
</div>

<!-- Vocab modal -->
<div id="vocabModal" class="modal-bg">
  <div class="modal">
    <h2>⭐ Mi vocabulario</h2>
    <div style="display:flex; gap:8px; margin-bottom:12px">
      <button class="grow" onclick="exportVocab()">⬇️ Exportar (.csv)</button>
      <button onclick="clearVocab()">🗑 Vaciar</button>
      <button onclick="closeModal('vocabModal')">Cerrar</button>
    </div>
    <div id="vocabList"></div>
    <div id="vocabEmpty" class="empty hidden">Aún no has guardado palabras. Haz clic en una palabra mientras lees y pulsa “Guardar”.</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* ============ STORAGE ============ */
const DB = {
  get books(){ return JSON.parse(localStorage.getItem('ll_books')||'[]'); },
  set books(v){ localStorage.setItem('ll_books', JSON.stringify(v)); },
  get vocab(){ return JSON.parse(localStorage.getItem('ll_vocab')||'[]'); },
  set vocab(v){ localStorage.setItem('ll_vocab', JSON.stringify(v)); },
  get prefs(){ return JSON.parse(localStorage.getItem('ll_prefs')||'{}'); },
  set prefs(v){ localStorage.setItem('ll_prefs', JSON.stringify(v)); },
};
let current = null; // current book being read

/* ============ THEME & FONT ============ */
function setTheme(t){
  document.body.dataset.theme = t;
  ['light','sepia','dark'].forEach(x=>document.getElementById('th-'+x).classList.toggle('on', x===t));
  const p = DB.prefs; p.theme = t; DB.prefs = p;
}
function changeFont(d){
  const p = DB.prefs; p.fs = Math.min(34, Math.max(14, (p.fs||20)+d*2)); DB.prefs = p;
  document.documentElement.style.setProperty('--fs', p.fs+'px');
}
(function initPrefs(){
  const p = DB.prefs;
  setTheme(p.theme||'light');
  document.documentElement.style.setProperty('--fs', (p.fs||20)+'px');
})();

/* ============ TOAST ============ */
let toastT;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>el.classList.remove('show'), 1900);
}

/* ============ LIBRARY ============ */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function renderLibrary(){
  const list = document.getElementById('booklist');
  const books = DB.books;
  list.innerHTML = '';
  document.getElementById('libEmpty').classList.toggle('hidden', books.length>0);
  books.forEach(b=>{
    const prog = b.chapters.length>1 ? Math.round((b.pos||0)/(b.chapters.length-1)*100) : (b.pos? 100:0);
    const card = document.createElement('div');
    card.className = 'bookcard';
    card.onclick = ()=>openBook(b.id);
    card.innerHTML = `
      <button class="del" title="Eliminar" onclick="event.stopPropagation();deleteBook('${b.id}')">✕</button>
      <div class="title">${esc(b.title)}</div>
      <div class="meta">${b.chapters.length} ${b.chapters.length===1?'sección':'secciones'} · ${b.words||0} palabras</div>
      <div class="prog"><i style="width:${prog}%"></i></div>
    `;
    list.appendChild(card);
  });
}

function deleteBook(id){
  if(!confirm('¿Eliminar este libro de tu biblioteca?')) return;
  DB.books = DB.books.filter(b=>b.id!==id);
  renderLibrary();
}

function saveBook(title, chapters){
  const words = chapters.join(' ').split(/\s+/).filter(Boolean).length;
  const books = DB.books;
  const book = { id:uid(), title:title||'Sin título', chapters, pos:0, words };
  books.unshift(book);
  DB.books = books;
  renderLibrary();
  return book;
}

/* ============ FILE / EPUB LOADING ============ */
function handleFiles(files){
  [...files].forEach(f=>{
    const name = f.name.replace(/\.(txt|epub)$/i,'');
    if(/\.epub$/i.test(f.name)) loadEpub(f, name);
    else if(/\.txt$/i.test(f.name)){
      const r = new FileReader();
      r.onload = ()=>{ const b=saveBook(name, splitChapters(r.result)); openBook(b.id); };
      r.readAsText(f);
    } else toast('Formato no soportado: '+f.name);
  });
}

async function loadEpub(file, fallbackTitle){
  try{
    toast('Procesando EPUB…');
    const zip = await JSZip.loadAsync(file);
    // 1. find OPF via container.xml
    const containerXml = await zip.file('META-INF/container.xml').async('string');
    const cdoc = new DOMParser().parseFromString(containerXml, 'application/xml');
    const opfPath = cdoc.querySelector('rootfile').getAttribute('full-path');
    const opfDir = opfPath.includes('/') ? opfPath.replace(/\/[^/]*$/, '/') : '';
    const opfXml = await zip.file(opfPath).async('string');
    const opf = new DOMParser().parseFromString(opfXml, 'application/xml');
    // title
    const titleEl = opf.querySelector('metadata title, title');
    const title = (titleEl && titleEl.textContent.trim()) || fallbackTitle;
    // manifest id->href
    const manifest = {};
    opf.querySelectorAll('manifest item').forEach(it=>{
      manifest[it.getAttribute('id')] = it.getAttribute('href');
    });
    // spine order
    const spine = [...opf.querySelectorAll('spine itemref')].map(ir=>ir.getAttribute('idref'));
    const chapters = [];
    for(const idref of spine){
      let href = manifest[idref];
      if(!href) continue;
      const full = decodeURIComponent(opfDir + href);
      const fileObj = zip.file(full) || zip.file(href);
      if(!fileObj) continue;
      const html = await fileObj.async('string');
      const text = htmlToText(html);
      if(text.trim().length>40) chapters.push(text);
    }
    if(!chapters.length){ toast('No se pudo extraer texto del EPUB'); return; }
    const b = saveBook(title, chapters);
    openBook(b.id);
  }catch(e){
    console.error(e);
    toast('Error leyendo el EPUB: '+e.message);
  }
}

function htmlToText(html){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  doc.querySelectorAll('script,style,head').forEach(n=>n.remove());
  const out = [];
  doc.body && doc.body.querySelectorAll('h1,h2,h3,h4,p,li,blockquote,div').forEach(n=>{
    const t = n.textContent.replace(/\s+/g,' ').trim();
    if(t) out.push(/^h[1-4]$/i.test(n.tagName) ? '## '+t : t);
  });
  // fallback if structure had no block elements
  if(!out.length && doc.body){
    const t = doc.body.textContent.replace(/\s+/g,' ').trim();
    if(t) out.push(t);
  }
  return out.join('\n\n');
}

// Split pasted/txt text into reasonable "chapters/pages"
function splitChapters(text){
  text = text.replace(/\r\n/g,'\n').trim();
  const paras = text.split(/\n\s*\n/).map(p=>p.trim()).filter(Boolean);
  const chapters = [];
  let buf = [], len = 0;
  const LIMIT = 3500;
  for(const p of paras){
    buf.push(p); len += p.length;
    if(len > LIMIT){ chapters.push(buf.join('\n\n')); buf=[]; len=0; }
  }
  if(buf.length) chapters.push(buf.join('\n\n'));
  return chapters.length ? chapters : [text];
}

/* ============ READER ============ */
function openBook(id){
  current = DB.books.find(b=>b.id===id);
  if(!current) return;
  document.getElementById('library').style.display='none';
  document.getElementById('reader').style.display='block';
  document.getElementById('readerControls').classList.remove('hidden');
  document.getElementById('readerTitle').textContent = current.title;
  renderChapter();
  window.scrollTo(0,0);
}
function goLibrary(){
  hidePopup();
  current = null;
  document.getElementById('reader').style.display='none';
  document.getElementById('readerControls').classList.add('hidden');
  document.getElementById('library').style.display='block';
  renderLibrary();
}
function renderChapter(){
  const pos = current.pos||0;
  const text = current.chapters[pos]||'';
  const container = document.getElementById('readerText');
  const savedSet = new Set(DB.vocab.map(v=>v.term.toLowerCase()));
  const paras = text.split(/\n\s*\n/);
  container.innerHTML = paras.map(p=>{
    if(p.startsWith('## ')) return '<h2>'+wrapWords(p.slice(3), savedSet)+'</h2>';
    return '<p>'+wrapWords(p, savedSet)+'</p>';
  }).join('');
  const info = `Sección ${pos+1} de ${current.chapters.length}`;
  document.getElementById('pageInfo').textContent = info;
  document.getElementById('pageInfo2').textContent = info;
  document.getElementById('prevBtn').disabled = pos===0;
  document.getElementById('nextBtn').disabled = pos===current.chapters.length-1;
}
// wrap each word-token in a clickable span, keep punctuation
function wrapWords(str, savedSet){
  return str.replace(/[A-Za-zÀ-ÿ]+(?:['’-][A-Za-zÀ-ÿ]+)*|[^A-Za-zÀ-ÿ]+/g, tok=>{
    if(/^[A-Za-zÀ-ÿ]/.test(tok)){
      const cls = savedSet.has(tok.toLowerCase()) ? 'w saved' : 'w';
      return `<span class="${cls}">${esc(tok)}</span>`;
    }
    return esc(tok);
  });
}
function prevChapter(){ if(current.pos>0){ current.pos--; persistPos(); renderChapter(); window.scrollTo(0,0); } }
function nextChapter(){ if(current.pos<current.chapters.length-1){ current.pos++; persistPos(); renderChapter(); window.scrollTo(0,0); } }
function persistPos(){
  const books = DB.books;
  const b = books.find(x=>x.id===current.id);
  if(b){ b.pos = current.pos; DB.books = books; }
}

/* ============ LOOKUP (word & phrase) ============ */
const pop = document.getElementById('pop');

document.getElementById('readerText').addEventListener('click', e=>{
  // if user selected a phrase, handle that on mouseup instead
  const sel = window.getSelection();
  if(sel && sel.toString().trim().split(/\s+/).length>1) return;
  const w = e.target.closest('.w');
  if(!w) return;
  e.stopPropagation();
  const word = w.textContent.replace(/^[^A-Za-zÀ-ÿ]+|[^A-Za-zÀ-ÿ]+$/g,'');
  showPopupNear(w);
  lookupWord(word);
});

// phrase selection
document.getElementById('readerText').addEventListener('mouseup', e=>{
  setTimeout(()=>{
    const sel = window.getSelection();
    const txt = sel.toString().trim();
    if(txt && txt.split(/\s+/).length>1 && txt.length<200){
      const rect = sel.getRangeAt(0).getBoundingClientRect();
      showPopupAt(rect.left+window.scrollX, rect.bottom+window.scrollY);
      lookupPhrase(txt);
    }
  },10);
});

document.addEventListener('click', e=>{
  if(!pop.contains(e.target) && !e.target.closest('.w')) hidePopup();
});

function showPopupNear(el){
  const r = el.getBoundingClientRect();
  showPopupAt(r.left+window.scrollX, r.bottom+window.scrollY+6);
}
function showPopupAt(x, y){
  pop.style.display='block';
  pop.style.left = Math.min(x, window.scrollX+document.documentElement.clientWidth-360)+'px';
  pop.style.top = y+'px';
}
function hidePopup(){ pop.style.display='none'; }

function speak(text){
  try{ const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){}
}

async function lookupWord(word){
  if(!word){ hidePopup(); return; }
  pop.innerHTML = `<div class="head"><span class="term">${esc(word)}</span></div><div class="loading">Buscando…</div>`;
  const [dict, tr] = await Promise.allSettled([ fetchDict(word), translate(word) ]);
  let html = `<div class="head"><span class="term">${esc(word)}</span>`;
  let phon='';
  if(dict.status==='fulfilled' && dict.value){
    phon = dict.value.phonetic||'';
  }
  if(phon) html += `<span class="phon">${esc(phon)}</span>`;
  html += `<button class="spk" title="Pronunciar" onclick="speak('${esc(word).replace(/'/g,"\\'")}')">🔊</button></div>`;

  const trText = tr.status==='fulfilled' ? tr.value : null;
  if(trText) html += `<div class="trans">🇪🇸 ${esc(trText)}</div>`;

  if(dict.status==='fulfilled' && dict.value && dict.value.meanings.length){
    dict.value.meanings.slice(0,3).forEach(m=>{
      html += `<div class="pos">${esc(m.pos)}</div>`;
      m.defs.slice(0,2).forEach(d=>{
        html += `<div class="defn">• ${esc(d.def)}</div>`;
        if(d.ex) html += `<div class="ex">“${esc(d.ex)}”</div>`;
      });
    });
  } else if(!trText){
    html += `<div class="err">No se encontró información para esta palabra.</div>`;
  }
  html += `<div class="row">
    <button class="primary" onclick="saveVocab('${jsesc(word)}','${jsesc(trText||'')}')">⭐ Guardar</button>
  </div>`;
  pop.innerHTML = html;
}

async function lookupPhrase(phrase){
  pop.innerHTML = `<div class="head"><span class="term">Frase</span>
    <button class="spk" onclick="speak('${jsesc(phrase)}')">🔊</button></div>
    <div class="ex">“${esc(phrase)}”</div><div class="loading">Traduciendo…</div>`;
  const tr = await translate(phrase).catch(()=>null);
  let html = `<div class="head"><span class="term">Frase</span>
    <button class="spk" onclick="speak('${jsesc(phrase)}')">🔊</button></div>
    <div class="ex">“${esc(phrase)}”</div>`;
  if(tr) html += `<div class="trans">🇪🇸 ${esc(tr)}</div>`;
  else html += `<div class="err">No se pudo traducir la frase.</div>`;
  html += `<div class="row"><button class="primary" onclick="saveVocab('${jsesc(phrase)}','${jsesc(tr||'')}')">⭐ Guardar</button></div>`;
  pop.innerHTML = html;
}

/* ---- APIs (free, no key) ---- */
async function fetchDict(word){
  const r = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word.toLowerCase()));
  if(!r.ok) return null;
  const data = await r.json();
  if(!Array.isArray(data)) return null;
  const entry = data[0];
  let phonetic = entry.phonetic || (entry.phonetics.find(p=>p.text)||{}).text || '';
  const meanings = (entry.meanings||[]).map(m=>({
    pos: m.partOfSpeech,
    defs: (m.definitions||[]).map(d=>({def:d.definition, ex:d.example}))
  }));
  return { phonetic, meanings };
}
async function translate(text){
  // MyMemory free translation API (en -> es)
  const r = await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair=en|es');
  if(!r.ok) return null;
  const d = await r.json();
  const t = d.responseData && d.responseData.translatedText;
  if(!t) return null;
  // skip if API returns the same text or a quota warning
  if(/MYMEMORY WARNING|QUERY LENGTH LIMIT/i.test(t)) return null;
  return t;
}

/* ============ VOCAB ============ */
function saveVocab(term, trans){
  term = term.trim();
  if(!term) return;
  const vocab = DB.vocab;
  if(vocab.some(v=>v.term.toLowerCase()===term.toLowerCase())){ toast('Ya estaba en tu vocabulario'); hidePopup(); return; }
  vocab.unshift({ term, trans, date: new Date().toISOString().slice(0,10) });
  DB.vocab = vocab;
  toast('⭐ Guardado: '+term);
  hidePopup();
  if(current) renderChapter();
}
function openVocab(){
  const list = document.getElementById('vocabList');
  const vocab = DB.vocab;
  document.getElementById('vocabEmpty').classList.toggle('hidden', vocab.length>0);
  list.innerHTML = vocab.map((v,i)=>`
    <div class="vocab-item">
      <span class="vt">${esc(v.term)}</span>
      <span class="vd">${esc(v.trans||'—')}</span>
      <button class="spk" onclick="speak('${jsesc(v.term)}')" style="border:none;background:none;cursor:pointer">🔊</button>
      <button class="vdel" onclick="delVocab(${i})">✕</button>
    </div>`).join('');
  document.getElementById('vocabModal').style.display='flex';
}
function delVocab(i){
  const vocab = DB.vocab; vocab.splice(i,1); DB.vocab = vocab;
  openVocab(); if(current) renderChapter();
}
function clearVocab(){
  if(!confirm('¿Vaciar todo el vocabulario?')) return;
  DB.vocab = []; openVocab(); if(current) renderChapter();
}
function exportVocab(){
  const vocab = DB.vocab;
  if(!vocab.length){ toast('No hay nada que exportar'); return; }
  const csv = 'term,translation,date\n'+vocab.map(v=>
    `"${v.term.replace(/"/g,'""')}","${(v.trans||'').replace(/"/g,'""')}","${v.date||''}"`).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download='vocabulario.csv'; a.click();
  URL.revokeObjectURL(a.href);
}

/* ============ MODALS ============ */
function openPaste(){
  document.getElementById('pasteTitle').value='';
  document.getElementById('pasteText').value='';
  document.getElementById('pasteModal').style.display='flex';
}
function savePaste(){
  const title = document.getElementById('pasteTitle').value.trim() || 'Texto pegado';
  const text = document.getElementById('pasteText').value;
  if(!text.trim()){ toast('Pega algún texto primero'); return; }
  closeModal('pasteModal');
  const b = saveBook(title, splitChapters(text));
  openBook(b.id);
}
function closeModal(id){ document.getElementById(id).style.display='none'; }
[...document.querySelectorAll('.modal-bg')].forEach(m=>{
  m.addEventListener('click', e=>{ if(e.target===m) m.style.display='none'; });
});

/* ============ DROPZONE ============ */
const dz = document.getElementById('dropzone');
['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('drag');}));
dz.addEventListener('drop', e=>{ if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });
window.addEventListener('dragover', e=>e.preventDefault());
window.addEventListener('drop', e=>e.preventDefault());

/* ============ KEYBOARD ============ */
document.addEventListener('keydown', e=>{
  if(document.getElementById('reader').style.display==='block'){
    if(e.key==='ArrowRight') nextChapter();
    if(e.key==='ArrowLeft') prevChapter();
    if(e.key==='Escape') hidePopup();
  }
});

/* ============ UTILS ============ */
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function jsesc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' '); }

/* ============ PWA ============ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW:', e));
  });
}
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('installBtn').classList.remove('hidden');
});
async function doInstall(){
  if(!deferredPrompt){
    toast('Usa el menú del navegador → “Añadir a pantalla de inicio”');
    return;
  }
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBtn').classList.add('hidden');
}
window.addEventListener('appinstalled', ()=>{
  document.getElementById('installBtn').classList.add('hidden');
  toast('¡Instalada! Ya la tienes en tu pantalla de inicio 📖');
});

/* ============ INIT ============ */
renderLibrary();
</script>
